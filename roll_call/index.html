<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll Call — San Diego Roller Rinks</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛼</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }

        body { background: linear-gradient(135deg, #ec4899, #a855f7); min-height: 100vh; color: white; }

        .bg-grain {
            position: fixed; inset: 0; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        .page {
            position: relative; z-index: 10;
            max-width: 640px; margin: 0 auto;
            padding: 2.5rem 1.25rem 4rem;
        }

        header { text-align: center; margin-bottom: 2.5rem; }
        h1 {
            font-size: 2rem; font-weight: 700;
            color: white;
            margin-bottom: 0.25rem;
        }
        .subtitle { color: rgba(255,255,255,0.85); font-size: 0.9rem; }

        .section-label {
            font-size: 1rem; font-weight: 700; letter-spacing: 0.05em;
            text-transform: uppercase; color: rgba(255,255,255,0.9);
            margin-bottom: 0.75rem; margin-top: 2rem;
        }

        .card {
            background: #000;
            border: none;
            border-radius: 1rem;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #0ea5e9, #0d9488);
            padding: 1rem 1.5rem 0.75rem;
        }

        .card-body {
            padding: 1rem 1.5rem 1.25rem;
        }

        .card-top {
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 1rem;
        }

        .card-name { font-size: 1.1rem; font-weight: 600; color: white; margin-bottom: 0.2rem; }

        .card-type {
            font-size: 0.75rem; font-weight: 600;
            padding: 0.2rem 0.6rem; border-radius: 999px;
            white-space: nowrap; flex-shrink: 0;
        }
        .type-indoor  { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.8); }
        .type-outdoor { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.8); }
        .type-free    { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.8); }

        .card-neighborhood { font-size: 0.8rem; color: rgba(255,255,255,0.7); }

        .card-details {
            display: flex; flex-wrap: wrap; align-items: flex-start;
            gap: 0.5rem 1.25rem; margin-bottom: 0.75rem;
        }

        .detail { font-size: 0.82rem; color: rgba(255,255,255,0.55); display: flex; align-items: center; gap: 0.3rem; }
        .detail-icon { opacity: 0.7; }

        .weather-row {
            display: flex; align-items: center; gap: 0.75rem;
            flex-basis: 100%; flex-wrap: wrap;
        }
        .weather-item {
            display: flex; align-items: center; gap: 0.3rem;
            font-size: 0.82rem; color: rgba(255,255,255,0.6);
        }
        .weather-emoji { font-size: 1rem; }
        .uv-badge {
            font-size: 0.75rem; font-weight: 600;
            padding: 0.15rem 0.5rem; border-radius: 999px;
        }

        .card-desc { font-size: 0.82rem; color: rgba(255,255,255,0.35); line-height: 1.5; margin-bottom: 0.75rem; }

        .card-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .link-btn {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.78rem; font-weight: 500;
            padding: 0.3rem 0.75rem; border-radius: 0.5rem;
            text-decoration: none; transition: all 0.15s;
        }
        .link-website { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.2); }
        .link-website:hover { background: rgba(0,0,0,0.35); }
        .link-map { background: rgba(0,0,0,0.15); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15); }
        .link-map:hover { background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.85); }

        .fade-in { animation: fadeIn 0.4s ease-out both; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-grain"></div>
    <div class="page">
        <header class="fade-in">
            <h1 style="display:flex;align-items:center;justify-content:center;gap:0.4rem"><span style="-webkit-text-fill-color:initial">🛼</span> Roll Call</h1>
            <div class="subtitle">Roller skating in San Diego</div>
        </header>
        <div id="content"></div>
    </div>

    <script>
        const SPOTS = {
            rinks: [
                {
                    name: "Ringer's Roller Rink",
                    type: 'outdoor',
                    neighborhood: 'Encanto',
                    address: '6060 Federal Blvd, San Diego, CA 92114',
                    details: ['💰 $18 (skates included)', '⏱️ 3-hour sessions'],
                    hours: {
                        0: '12pm – 7pm',
                        1: '5pm – 8pm',
                        2: '5pm – 8pm',
                        3: '5pm – 8pm',
                        4: '5pm – 10pm',
                        5: '5pm – 10pm',
                        6: '10am – 11pm',
                    },
                    desc: "Hosts '90s nights, themed skate sessions, and 21+ sessions with drinks.",
                    website: 'https://www.ringersrollerrink.com',
                    events: 'https://tickets.ringersrollerrink.com/facilityschedule/en-us/products',
                    lat: 32.706, lon: -117.072,
                },
                {
                    name: 'Skateworld San Diego',
                    type: 'indoor',
                    neighborhood: 'Linda Vista',
                    address: '6907 Linda Vista Rd, San Diego, CA 92111',
                    details: ['💰 $15 + $7 skate rental'],
                    hours: {
                        0: '12pm – 8:30pm',
                        1: null,
                        2: '10am – 12pm  &  8:30pm – 11pm',
                        3: '5:30pm – 9pm',
                        4: '10am – 12pm  &  5pm – 11pm',
                        5: '5pm – 10pm',
                        6: '11am – 10pm',
                    },
                    desc: "Classic circular wood floor with disco ball and LED light show. Family nights, adult DJ nights (Tue/Thu), youth roller derby.",
                    website: 'https://www.skateworld.com',
                    events: 'https://www.skateworld.com/#Tickets',
                    lat: null, lon: null, // indoor — no weather
                },
            ],
            outdoor: [
                {
                    name: 'Mission Beach Boardwalk',
                    type: 'free',
                    neighborhood: 'Mission Beach / Pacific Beach',
                    address: 'W Mission Bay Dr, Mission Beach, San Diego',
                    details: ['📏 3.5 miles', '🌊 Beachside'],
                    desc: "San Diego's most iconic skating path — flat concrete boardwalk right alongside the beach with restaurants, shops, and people-watching the whole way.",
                    lat: 32.784, lon: -117.252,
                },
                {
                    name: 'Pan American Plaza',
                    type: 'free',
                    neighborhood: 'Balboa Park',
                    address: '2001 Pan American Plaza, San Diego, CA 92101',
                    details: ['🎵 Community night skates Wed & Sat ~6–9pm', '🛼 Smooth concrete, open anytime'],
                    desc: 'Large open plaza next to the Air & Space Museum — a hub for the SD skate community. Regular night skates with a DJ on Wednesdays and Saturdays.',
                    lat: 32.729, lon: -117.150,
                },
                {
                    name: 'The Embarcadero',
                    type: 'free',
                    neighborhood: 'Downtown',
                    address: '200 Marina Park Way, San Diego',
                    details: ['📏 8 miles roundtrip', '⛵ Bayfront views'],
                    desc: 'Long, smooth waterfront path past the USS Midway, Star of India, and the Unconditional Surrender statue. Flat and easy the whole way.',
                    lat: 32.714, lon: -117.177,
                },
                {
                    name: 'Liberty Station',
                    type: 'free',
                    neighborhood: 'Point Loma',
                    address: '2875 Dewey Rd, San Diego',
                    details: ['📏 1-mile paved path', '🏛️ Former Naval base'],
                    desc: 'Smooth concrete through a beautifully restored former Naval Training Center. Community skating groups sometimes hold free lessons here.',
                    lat: 32.727, lon: -117.213,
                },
                {
                    name: 'Coastal Rail Trail',
                    type: 'free',
                    neighborhood: 'Cardiff to Encinitas',
                    address: 'S Coast Hwy 101, Cardiff, CA',
                    details: ['📏 3 miles out-and-back', '🌿 Flat, fresh concrete'],
                    desc: 'One of the smoothest stretches for skating in SD — newer flat concrete with a scenic coastal vibe, part of a planned 44-mile trail.',
                    lat: 33.004, lon: -117.279,
                },
                {
                    name: 'Silver Strand Bikeway',
                    type: 'free',
                    neighborhood: 'Coronado to Imperial Beach',
                    address: 'Silver Strand State Beach, Coronado, CA',
                    details: ['📏 ~9 miles one way', '🏖️ Ocean on one side, bay on the other'],
                    desc: 'A long, flat dedicated path along the Silver Strand peninsula with views of both the Pacific and San Diego Bay. One of the most scenic routes in the county.',
                    lat: 32.663, lon: -117.155,
                },
                {
                    name: 'Sunset View Park',
                    type: 'free',
                    neighborhood: 'Chula Vista',
                    address: '1390 S Greensview Dr, Chula Vista',
                    details: ['⏰ 7–10pm daily', '🏒 Roller hockey rink'],
                    desc: 'Outdoor roller hockey rink open to the public evenings when games are not scheduled. Community meetups and skating events happen here regularly.',
                    lat: 32.618, lon: -117.057,
                },
            ],
        };

        const weatherCache = {}; // key: "lat,lon" → current weather

        function weatherCodeEmoji(code) {
            if (code === 0)  return '☀️';
            if (code === 1)  return '🌤️';
            if (code === 2)  return '⛅';
            if (code === 3)  return '☁️';
            if (code <= 48)  return '🌫️';
            if (code <= 55)  return '🌦️';
            if (code <= 65)  return '🌧️';
            if (code <= 77)  return '🌨️';
            if (code === 80) return '🌦️';
            if (code <= 82)  return '🌧️';
            if (code <= 86)  return '🌨️';
            return '⛈️';
        }

        function uvLabel(uv) {
            if (uv <= 2)  return { label: 'Low',       color: '#4ade80' };
            if (uv <= 5)  return { label: 'Moderate',  color: '#facc15' };
            if (uv <= 7)  return { label: 'High',      color: '#fb923c' };
            if (uv <= 10) return { label: 'Very High', color: '#f87171' };
            return             { label: 'Extreme',    color: '#c084fc' };
        }

        async function fetchWeather() {
            const spots = [...SPOTS.rinks, ...SPOTS.outdoor].filter(s => s.lat !== null);
            await Promise.all(spots.map(async s => {
                const key = `${s.lat},${s.lon}`;
                if (weatherCache[key]) return;
                try {
                    const res = await fetch(
                        `https://api.open-meteo.com/v1/forecast` +
                        `?latitude=${s.lat}&longitude=${s.lon}` +
                        `&current=apparent_temperature,weather_code,uv_index` +
                        `&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles`
                    );
                    const data = await res.json();
                    weatherCache[key] = data.current;
                } catch (e) {}
            }));
            render();
        }

        function parseHour(str) {
            str = str.trim();
            const pm = str.endsWith('pm');
            const am = str.endsWith('am');
            str = str.replace(/[ap]m$/, '');
            const [h, m] = str.split(':').map(Number);
            let hour = h + (m || 0) / 60;
            if (pm && h !== 12) hour += 12;
            if (am && h === 12) hour = (m || 0) / 60;
            return hour;
        }

        function isOpenNow(spot) {
            if (!spot.hours) return false;
            const day = new Date().getDay();
            const h = spot.hours[day];
            if (!h) return false;
            const now = new Date();
            const current = now.getHours() + now.getMinutes() / 60;
            return h.split('&').some(session => {
                const [open, close] = session.split('–').map(s => parseHour(s));
                return current >= open && current < close;
            });
        }

        function todayHoursHTML(spot) {
            if (!spot.hours) return '';
            const day = new Date().getDay();
            const h = spot.hours[day];
            const openNow = isOpenNow(spot);
            const sat = spot.hours[6];
            const sun = spot.hours[0];
            const dim = 'color:rgba(255,255,255,0.3)';
            const todayText = h === null
                ? `<span style="color:#f87171">Closed today</span>`
                : `Today: ${h}${openNow ? `<span style="color:#4ade80;font-weight:600;margin-left:0.4rem">● Open now</span>` : ''}`;
            const satText = sat ?? `<span style="color:#f87171">Closed</span>`;
            const sunText = sun ?? `<span style="color:#f87171">Closed</span>`;
            return `
                <div style="flex-basis:100%;display:flex;flex-direction:column;gap:0.2rem;font-size:0.82rem;color:rgba(255,255,255,0.55)">
                    <div>${todayText}</div>
                    ${day !== 6 ? `<div><span style="${dim}">Sat:</span> ${satText}</div>` : ''}
                    ${day !== 0 ? `<div><span style="${dim}">Sun:</span> ${sunText}</div>` : ''}
                </div>`;
        }

        function weatherHTML(spot) {
            if (spot.lat === null) return '';
            const key = `${spot.lat},${spot.lon}`;
            const w = weatherCache[key];
            if (!w) return '';
            const emoji = weatherCodeEmoji(w.weather_code);
            const feels = Math.round(w.apparent_temperature);
            const uv = Math.round(w.uv_index);
            const uvInfo = uvLabel(uv);
            return `
                <div class="weather-row">
                    <div class="weather-item">
                        <span class="weather-emoji">${emoji}</span>
                        <span>Feels like ${feels}°F</span>
                    </div>
                    <div class="weather-item">
                        <span class="uv-badge" style="background:${uvInfo.color}22;color:${uvInfo.color}">
                            UV ${uv} ${uvInfo.label}
                        </span>
                    </div>
                </div>`;
        }

        function cardHTML(spot, delay) {
            const typeClass = { indoor: 'type-indoor', outdoor: 'type-outdoor', free: 'type-free' }[spot.type];
            const typeLabel = { indoor: 'Indoor', outdoor: 'Outdoor', free: 'Free' }[spot.type];
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(spot.address)}`;
            return `
                <div class="card fade-in" style="animation-delay:${delay}s">
                    <div class="card-header">
                        <div class="card-top">
                            <div class="card-name">${spot.name}</div>
                            <span class="card-type ${typeClass}">${typeLabel}</span>
                        </div>
                        <div class="card-neighborhood">${spot.neighborhood}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-details">
                            ${spot.details.map(d => `<div class="detail">${d}</div>`).join('')}
                            ${todayHoursHTML(spot)}
                            ${weatherHTML(spot)}
                        </div>
                        <div class="card-desc">${spot.desc}</div>
                        <div class="card-links">
                            ${spot.website ? `<a href="${spot.website}" class="link-btn link-website" target="_blank" rel="noopener">🌐 Website</a>` : ''}
                            ${spot.events ? `<a href="${spot.events}" class="link-btn link-website" target="_blank" rel="noopener">🎟️ Events</a>` : ''}
                            <a href="${mapUrl}" class="link-btn link-map" target="_blank" rel="noopener">📍 Map</a>
                        </div>
                    </div>
                </div>`;
        }

        function render() {
            let delay = 0.05;
            let html = '';
            html += '<div class="section-label">Rinks</div>';
            for (const s of SPOTS.rinks) { html += cardHTML(s, delay); delay += 0.05; }
            html += '<div class="section-label">Free Outdoor Spots</div>';
            for (const s of SPOTS.outdoor) { html += cardHTML(s, delay); delay += 0.05; }
            document.getElementById('content').innerHTML = html;
        }

        render();
        fetchWeather();
    </script>
</body>
</html>
